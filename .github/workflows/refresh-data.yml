name: Monthly data refresh

# Re-download the public sources, rebuild data/processed, retrain the models, and
# commit the refreshed data + models so the deployed app stays current. Prices,
# CPI, fertilizer and rainfall are published monthly, so this runs once a month
# (and can be triggered by hand). If nothing changed, it commits nothing.

on:
  schedule:
    - cron: "0 6 5 * *"     # 06:00 UTC on the 5th of each month
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write             # to commit the refreshed data + models

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download, clean, and retrain
        run: |
          python scripts/download_data.py
          python scripts/prepare_data.py
          python scripts/train_models.py

      - name: Commit refreshed data and models
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed models_store
          if git diff --staged --quiet; then
            echo "No data or model changes this run."
          else
            git commit -m "Automated monthly data + model refresh [skip ci]"
            git push
          fi